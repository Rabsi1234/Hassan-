<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>Hassan Watches | حسن للساعات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        
        body, html {
            height: 100%; margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية فخمة مع تعتيم */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1523170335258-f5ed11844a49?q=80&w=1480');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        .welcome-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--gold);
            border-radius: 25px;
            padding: 60px 30px;
            text-align: center;
            max-width: 90%;
            width: 400px;
            backdrop-filter: blur(12px); /* تأثير التغبيش الفخم */
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-name {
            font-size: 3rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 15px;
            font-weight: 300;
            line-height: 1.2;
        }

        .slogan {
            color: #ffffff;
            font-size: 1.15rem;
            margin-bottom: 45px;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        /* الزر المنسق الذي يفتح صفحة الساعات الجديدة */
        .enter-btn {
            background-color: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-direction: row-reverse; /* لضمان ترتيب العربي ثم الإنجليزي */
        }

        .enter-btn:hover {
            background-color: var(--gold);
            color: #000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1 class="brand-name">HASSAN<br>WATCHES</h1>
        <p class="slogan">الدقة والأناقة في مكان واحد</p>
        
        <a href="watches.html" class="enter-btn">
            <div class="btn-content">
                <span>استكشف</span>
                <span style="opacity: 0.5;">|</span>
                <span>EXPLORE</span>
            </div>
        </a>
    </div>

</body>
</html>
